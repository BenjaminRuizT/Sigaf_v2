version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sigaf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sigaf
      POSTGRES_USER: sigaf
      POSTGRES_PASSWORD: sigaf_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigaf -d sigaf"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigaf_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://sigaf:sigaf_pass@postgres:5432/sigaf
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS_STR: http://localhost:3000,${FRONTEND_URL:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data          # Mount xlsx data files here
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sigaf_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:

# railway.toml — SIGAF v2.0
# This file tells Railway how to build and deploy each service.

[build]
  builder = "DOCKERFILE"

[[services]]
  name = "backend"
  [services.build]
    builder = "DOCKERFILE"
    dockerfilePath = "Dockerfile"
    buildContext = "backend"
  [services.deploy]
    startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthcheckPath = "/api/health"
    healthcheckTimeout = 300

[[services]]
  name = "frontend"
  [services.build]
    builder = "DOCKERFILE"
    dockerfilePath = "Dockerfile"
    buildContext = "frontend"
  [services.deploy]
    startCommand = "node server.js"
    healthcheckPath = "/"
